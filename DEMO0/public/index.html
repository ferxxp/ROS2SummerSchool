<h2>POST to /echo</h2>
<p>Send a message and see the raw HTTP response.</p>

<form action="/echo" method="POST">
  <input type="text" name="message" placeholder="Type a message..." required>
  <button type="submit">Send</button>
</form>

<pre id="result"></pre>

<script>
document.querySelector('form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const input = document.querySelector('[name="message"]');
  const res = await fetch('/echo', { method: 'POST', body: new URLSearchParams({message: input.value}) });
  document.getElementById('result').textContent = 'Server says: ' + await res.text();
});
</script>
